<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RTX Змейка - Соревнования</title>
    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #dce0e8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; touch-action: none; }
        
        /* Экран загрузки */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
            transition: opacity 0.5s ease;
        }
        .loader-logo { color: white; font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; }
        .loader-logo .rtx-tag { background: #76b900; color: white; padding: 2px 6px; border-radius: 4px; font-size: 14px; margin-left: 5px; }
        .loader-bar-container { width: 200px; height: 4px; background: #333; border-radius: 2px; overflow: hidden; margin-bottom: 20px; }
        .loader-bar-fill { width: 0%; height: 100%; background: #76b900; transition: width 0.3s; }
        
        #start-prompt { color: #76b900; font-weight: bold; cursor: pointer; display: none; animation: pulse 1.5s infinite; background: none; border: 2px solid #76b900; padding: 10px 20px; border-radius: 10px; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        #ui { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 20px; box-sizing: border-box; color: #222; font-weight: bold; }
        .rtx { background: linear-gradient(45deg, #76b900, #4c7700); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        
        #trophy-btn { pointer-events: auto; background: white; border: 2px solid #222; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #trophy-btn:active { transform: scale(0.9); }
        
        #leaderboard-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.98); padding: 30px; border-radius: 24px; border: 3px solid #76b900; display: none; z-index: 50; box-shadow: 0 20px 50px rgba(0,0,0,0.3); backdrop-filter: blur(10px); min-width: 280px; }
        #over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(255,255,255,0.98); padding: 30px; border-radius: 24px; border: 3px solid #ff4444; display: none; z-index: 30; box-shadow: 0 20px 50px rgba(0,0,0,0.3); backdrop-filter: blur(10px); min-width: 280px; }
        
        .btn { background: #222; color: #76b900; border: none; padding: 12px 25px; font-weight: bold; border-radius: 12px; cursor: pointer; pointer-events: auto; margin-top: 15px; width: 100%; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: #eee; color: #333; margin-top: 8px; }

        #leaderboard-list { text-align: left; margin: 20px 0; max-height: 250px; overflow-y: auto; color: #333; }
        .leader-item { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .leader-item.current-user { background: rgba(118, 185, 0, 0.1); border-radius: 8px; font-weight: bold; }
        
        #pause-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; color: #222; display: none; z-index: 15; background: rgba(255,255,255,0.7); padding: 10px 20px; border-radius: 10px; pointer-events: none; text-align: center; }
        
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }
    </style>
    <script type="importmap">
        { 
            "imports": { 
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", 
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
            } 
        }
    </script>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-logo">SNAKE <span class="rtx-tag">RTX</span></div>
        <div class="loader-bar-container" id="bar-box">
            <div id="loader-fill" class="loader-bar-fill"></div>
        </div>
        <button id="start-prompt" onclick="startGameAfterLoad()">НАЖМИТЕ ДЛЯ СТАРТА</button>
    </div>

    <div id="ui">
        <div style="display: flex; align-items: center;">
            <div id="trophy-btn" title="Таблица лидеров">🏆</div>
            <div style="margin-left: 15px;"><span id="txt-logo-1">ЗМЕЙКА</span> <span class="rtx">RTX</span></div>
        </div>
        <div><span id="txt-score">СЧЕТ</span>: <span id="score">0</span></div>
    </div>

    <div id="pause-msg">ПАУЗА</div>

    <div id="leaderboard-modal">
        <span class="close-btn" onclick="closeLeaderboard()">×</span>
        <h2 id="txt-lb-title" style="margin-top: 0; color: #222;">🏆 РЕКОРДЫ</h2>
        <div id="leaderboard-list">Подключение...</div>
        <button id="txt-lb-close" class="btn" onclick="closeLeaderboard()">ЗАКРЫТЬ</button>
    </div>

    <div id="over">
        <h1 id="txt-over-title" style="color: #ff4444; margin-top: 0;">GAME OVER</h1>
        <p><span id="txt-your-score">Ваш счет</span>: <span id="f-score">0</span></p>
        <p id="new-record-msg" style="color: #76b900; display: none; font-weight: bold;">НОВЫЙ РЕКОРД!</p>
        <button id="txt-restart" class="btn" onclick="restartGame()">ИГРАТЬ СНОВА</button>
        <button id="txt-lb-btn" class="btn btn-secondary" onclick="openLeaderboard()">ТАБЛИЦА ЛИДЕРОВ</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, initializeFirestore } from 'firebase/firestore';

        const loaderFill = document.getElementById('loader-fill');
        const startPrompt = document.getElementById('start-prompt');
        function setProgress(p) { if(loaderFill) loaderFill.style.width = p + '%'; }

        const clock = new THREE.Clock();

        // --- FIREBASE SETUP ---
        const myConfig = {
            apiKey: "AIzaSyAhrGHmHKc8Zi6OTA3WFtcgCO7LdfKWIzk",
            authDomain: "snakertx-77753.firebaseapp.com",
            projectId: "snakertx-77753",
            storageBucket: "snakertx-77753.firebasestorage.app",
            messagingSenderId: "447499539462",
            appId: "1:447499539462:web:871dacf1d2cb27bb3c5f87",
            measurementId: "G-WRFPKJ8F3Q"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : myConfig;
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { experimentalForceLongPolling: true });
        const appId = typeof __app_id !== 'undefined' ? __app_id : "snakertx-77753";
        
        let user = null;
        let playerName = "Гость"; 
        let highscore = 0;
        let authReady = false;
        let gameLang = 'ru';

        let isPaused = true; 
        let isOver = false;

        setProgress(20);

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth init error:", err);
                authReady = true; 
                checkLoadingFinished();
            }
        };

        onAuthStateChanged(auth, async (u) => {
            user = u;
            if (user) {
                authReady = true;
                setProgress(60);
                try {
                    const statsDoc = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'stats'));
                    if (statsDoc.exists()) highscore = statsDoc.data().highscore || 0;
                } catch (e) {}
                checkLoadingFinished();
            }
        });
        
        initAuth();

        // --- YANDEX SDK ---
        let ysdk = null;
        async function initYandex() {
            try {
                const _sdk = await YaGames.init();
                ysdk = _sdk;
                gameLang = ysdk.environment.i18n.lang;
                if (gameLang !== 'ru' && gameLang !== 'be' && gameLang !== 'kk' && gameLang !== 'uk') applyEnglishLocalization();
                try {
                    const player = await ysdk.getPlayer({ scopes: true });
                    if (player) playerName = player.getName() || "Yandex Player";
                } catch (e) {}
                ysdk.features.LoadingProgress.ready();
            } catch (err) {}
            setProgress(80);
            checkLoadingFinished();
        }
        initYandex();

        function applyEnglishLocalization() {
            const mappings = {
                'txt-logo-1': "SNAKE", 'txt-score': "SCORE", 'pause-msg': "PAUSED",
                'txt-lb-title': "🏆 RECORDS", 'txt-lb-close': "CLOSE", 'txt-your-score': "Your score",
                'new-record-msg': "NEW RECORD!", 'txt-restart': "PLAY AGAIN",
                'txt-lb-btn': "LEADERBOARD", 'start-prompt': "CLICK TO START"
            };
            Object.keys(mappings).forEach(id => {
                const el = document.getElementById(id);
                if(el) el.innerText = mappings[id];
            });
        }

        function checkLoadingFinished() {
            if (authReady) {
                setProgress(100);
                const barBox = document.getElementById('bar-box');
                if (barBox) barBox.style.display = 'none';
                if (startPrompt) startPrompt.style.display = 'block';
            }
        }

        window.startGameAfterLoad = () => {
            const screen = document.getElementById('loading-screen');
            if (screen) {
                screen.style.opacity = '0';
                setTimeout(() => {
                    screen.style.display = 'none';
                    isPaused = false;
                    clock.getDelta(); 
                }, 500);
            }
        };

        // --- GAME LOGIC ---
        async function updateLeaderboard() {
            const lbList = document.getElementById('leaderboard-list');
            lbList.innerHTML = gameLang === 'ru' ? "Загрузка..." : "Loading...";
            
            if (!user) {
                lbList.innerHTML = "Ошибка авторизации";
                return;
            }

            try {
                const snapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard'));
                let scores = [];
                snapshot.forEach(d => { if(d.data().score !== undefined) scores.push({...d.data(), id: d.id}); });
                scores.sort((a, b) => b.score - a.score);
                
                lbList.innerHTML = scores.slice(0, 10).map((s, i) => `
                    <div class="leader-item ${user && s.id === user.uid ? 'current-user' : ''}">
                        <span>${i+1}. ${s.name || 'Anonymous'}</span>
                        <span>${s.score}</span>
                    </div>
                `).join('') || (gameLang === 'ru' ? "Рекордов пока нет" : "No records yet");
            } catch (e) { 
                console.error("Leaderboard error:", e);
                lbList.innerHTML = "Error loading data"; 
            }
        }

        window.openLeaderboard = () => {
            isPaused = true;
            document.getElementById('over').style.display = 'none';
            document.getElementById('leaderboard-modal').style.display = 'block';
            updateLeaderboard();
        };

        window.closeLeaderboard = () => {
            document.getElementById('leaderboard-modal').style.display = 'none';
            if (isOver) document.getElementById('over').style.display = 'block';
            else isPaused = false;
        };

        document.getElementById('trophy-btn').onclick = openLeaderboard;

        // --- GAMEPLAY ENGINE ---
        const GRID_SIZE = 30; 
        const SPEED = 8.5;
        const SPACING = 0.15; 
        let score = 0;
        let snakeLen = 4.0, visualLen = 4.0, path = []; 
        let headPos = new THREE.Vector3(0, 0.45, 0);
        let curDir = new THREE.Vector3(0, 0, -1), nextDir = new THREE.Vector3(0, 0, -1);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f2f5);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 500);
        camera.position.set(0, 32, 20); camera.lookAt(0, -2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.2, 0.1, 0.8));

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(10, 20, 10); sun.castShadow = true;
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE), new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.5 }));
        floor.rotation.x = -Math.PI/2; floor.receiveShadow = true; scene.add(floor);
        scene.add(new THREE.GridHelper(GRID_SIZE, GRID_SIZE, 0x444444, 0xcccccc));

        const appleGroup = new THREE.Group();
        scene.add(appleGroup);
        const foodLight = new THREE.PointLight(0xff0044, 10, 20); scene.add(foodLight);

        function createFallbackApple() {
            const p = new THREE.Mesh(new THREE.IcosahedronGeometry(0.4, 1), new THREE.MeshStandardMaterial({ color: 0xff2244 }));
            p.castShadow = true; appleGroup.add(p);
        }
        createFallbackApple();

        const head = new THREE.Mesh(new THREE.SphereGeometry(0.52, 24, 24), new THREE.MeshPhysicalMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 }));
        head.castShadow = true; scene.add(head);
        const bodyMat = new THREE.MeshPhysicalMaterial({ color: 0x00ffaa, emissive: 0x00ffaa, emissiveIntensity: 0.3, roughness: 0.2 });
        const tailCap = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), bodyMat);
        scene.add(tailCap);
        let bodyMesh = null;

        function spawnFood() {
            appleGroup.position.set(Math.floor(Math.random()*(GRID_SIZE-6)) - (GRID_SIZE/2-3) + 0.5, 0.5, Math.floor(Math.random()*(GRID_SIZE-6)) - (GRID_SIZE/2-3) + 0.5);
            foodLight.position.copy(appleGroup.position);
        }

        function init() {
            path = []; 
            for(let i=0; i < 30; i++) path.push(new THREE.Vector3(headPos.x, headPos.y, headPos.z + i * SPACING));
            spawnFood();
        }

        window.restartGame = () => location.reload();
        let distAccumulator = 0;

        function update() {
            if(isOver || isPaused) { 
                clock.getDelta(); 
                return; 
            }
            
            const delta = Math.min(clock.getDelta(), 0.05);
            if (visualLen < snakeLen) visualLen += delta * 2.0; 
            if (nextDir.dot(curDir) > -0.5) curDir.copy(nextDir);
            
            const moveStep = SPEED * delta;
            headPos.add(curDir.clone().multiplyScalar(moveStep));
            distAccumulator += moveStep;
            
            if (path.length > 0) path[0].copy(headPos);
            if (distAccumulator >= SPACING) {
                path.unshift(headPos.clone());
                distAccumulator = 0;
                if (path.length > 500) path.length = 500;
            }

            if(Math.abs(headPos.x) > GRID_SIZE/2 || Math.abs(headPos.z) > GRID_SIZE/2) gameOver();
            const checkEnd = Math.floor(visualLen / SPACING);
            for(let i = 8; i < checkEnd; i++) { if(path[i] && headPos.distanceTo(path[i]) < 0.4) gameOver(); }
            
            if(headPos.distanceTo(appleGroup.position) < 0.8) { 
                score += 10; snakeLen += 1.3; 
                document.getElementById('score').innerText = score; spawnFood(); 
            }
            
            head.position.copy(headPos);
            head.lookAt(headPos.clone().add(curDir));
            renderBody();
            appleGroup.rotation.y += 0.04;
        }

        function renderBody() {
            const pointsCount = Math.max(2, Math.floor(visualLen / SPACING));
            const currentPath = path.slice(0, pointsCount);
            if(currentPath.length > 2) {
                const curve = new THREE.CatmullRomCurve3(currentPath);
                const geo = new THREE.TubeGeometry(curve, Math.min(currentPath.length * 2, 400), 0.38, 8, false);
                if(bodyMesh) { bodyMesh.geometry.dispose(); bodyMesh.geometry = geo; } 
                else { bodyMesh = new THREE.Mesh(geo, bodyMat); bodyMesh.castShadow = true; scene.add(bodyMesh); }
                tailCap.position.copy(currentPath[currentPath.length - 1]);
                tailCap.visible = true;
            } else { tailCap.visible = false; }
        }

        async function gameOver() { 
            if(isOver) return;
            isOver = true; isPaused = true;
            document.getElementById('over').style.display = 'block'; 
            document.getElementById('f-score').innerText = score; 
            if (user) {
                if (score > highscore) {
                    highscore = score;
                    document.getElementById('new-record-msg').style.display = 'block';
                }
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'stats'), { highscore, name: playerName }, { merge: true });
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaderboard', user.uid), { name: playerName, score: highscore, timestamp: Date.now() });
                } catch (e) {}
            }
        }

        function loop() { requestAnimationFrame(loop); update(); composer.render(); }
        
        // Обработчик нажатия клавиш: поддержка Стрелок, WASD и ЦФЫВ (русская раскладка)
        window.addEventListener('keydown', (e) => {
            if (isPaused && !isOver) return;
            const k = e.key.toLowerCase();
            
            // Вверх (ArrowUp, W, Ц)
            if((k === 'arrowup' || k === 'w' || k === 'ц') && curDir.z === 0) nextDir.set(0, 0, -1);
            // Вниз (ArrowDown, S, Ы)
            else if((k === 'arrowdown' || k === 's' || k === 'ы') && curDir.z === 0) nextDir.set(0, 0, 1);
            // Влево (ArrowLeft, A, Ф)
            else if((k === 'arrowleft' || k === 'a' || k === 'ф') && curDir.x === 0) nextDir.set(-1, 0, 0);
            // Вправо (ArrowRight, D, В)
            else if((k === 'arrowright' || k === 'd' || k === 'в') && curDir.x === 0) nextDir.set(1, 0, 0);
        });
        
        init(); loop();
        window.onresize = () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
